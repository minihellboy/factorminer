version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: ci
    open-pull-requests-limit: 3

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Berlin
    groups:
      python-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: build
    open-pull-requests-limit: 3
