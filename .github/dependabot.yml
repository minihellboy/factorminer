version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: ci
    open-pull-requests-limit: 3

  - package-ecosystem: uv
    directory: /
    versioning-strategy: lockfile-only
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Berlin
    groups:
      routine-python-updates:
        # Keep broad numerical, LLM, plotting, native, and model-stack updates
        # isolated. This group is limited to routine framework/tooling changes.
        patterns:
          - click
          - mcp
          - mypy
          - pydantic-settings
          - pytest
          - pytest-cov
          - python-multipart
          - ruff
          - starlette
          - tqdm
        update-types:
          - minor
          - patch
    commit-message:
      prefix: build
    open-pull-requests-limit: 3
