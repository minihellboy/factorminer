version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: ci
    open-pull-requests-limit: 3

  - package-ecosystem: uv
    directory: /
    versioning-strategy: lockfile-only
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Berlin
    groups:
      python-dependencies:
        patterns:
          - "*"
        # Native and accelerator stacks require individual compatibility review.
        exclude-patterns:
          - cupy-cuda12x
          - faiss-cpu
          - sentence-transformers
          - tokenizers
          - torch
          - transformers
          - xgboost
    commit-message:
      prefix: build
    open-pull-requests-limit: 3
